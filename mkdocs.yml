site_name: pygwire
site_description: Low-level PostgreSQL wire protocol (3.0 & 3.2) codec for Python
site_url: https://dhukk.github.io/pygwire
repo_url: https://github.com/DHUKK/pygwire
repo_name: DHUKK/pygwire

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: quickstart.md
  - User Guide:
      - Connection: guide/connection.md
      - Codec: guide/codec.md
      - Messages: guide/messages.md
      - State Machine: guide/state-machine.md
  - Examples:
      - Authentication Proxy: examples/auth-proxy.md
  - API Reference:
      - pygwire: reference/core.md
      - pygwire.messages: reference/messages.md
      - pygwire.constants: reference/constants.md
      - pygwire.state_machine: reference/state-machine.md
      - pygwire.connection: reference/connection.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list
