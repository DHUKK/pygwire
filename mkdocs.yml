site_name: pygwire
site_description: Low-level PostgreSQL wire protocol (3.0 & 3.2) codec for Python
site_url: https://dhukk.github.io/pygwire
repo_url: https://github.com/DHUKK/pygwire
repo_name: DHUKK/pygwire

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
      - Connection: reference/connection.md
      - Codec: reference/codec.md
      - Messages:
          - Overview: reference/messages/index.md
          - Startup: reference/messages/startup.md
          - Authentication: reference/messages/auth.md
          - Simple Query: reference/messages/simple-query.md
          - Extended Query: reference/messages/extended-query.md
          - COPY: reference/messages/copy.md
          - Errors and Notices: reference/messages/errors.md
          - Miscellaneous: reference/messages/misc.md
      - State Machine: reference/state-machine.md
      - Constants: reference/constants.md
  - Examples:
      - Authentication Proxy: examples/auth-proxy.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list
